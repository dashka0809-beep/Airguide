name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-tests:
    name: Backend tests (node:test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install deps
        run: npm ci || npm install

      - name: Run tests
        run: node --test test/
        env:
          # config.js-ийн Zod parse-г хангах dummy утга (бодит холболтгүй)
          DATABASE_URL: postgresql://ci:ci@localhost:5432/ci
          JWT_SECRET: ci_only_secret_min_32_chars_xxxxxxxxxx
          NODE_ENV: test
