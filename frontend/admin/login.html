<!DOCTYPE html>
<html lang="mn">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Air Guide — Admin нэвтрэх</title>
<link rel="stylesheet" href="css/admin.css" />
</head>
<body>
<div class="login-wrap">
  <div class="login-card">
    <h1>Air Guide</h1>
    <div class="sub">Operator самбар — нэвтрэх</div>
    <form id="login-form">
      <label for="username">Нэвтрэх нэр</label>
      <input id="username" name="username" type="text" autocomplete="username" required autofocus />
      <label for="password">Нууц үг</label>
      <input id="password" name="password" type="password" autocomplete="current-password" required />
      <div id="err" class="login-err" hidden></div>
      <button type="submit" id="submit">Нэвтрэх</button>
    </form>
    <div class="login-hint">
      Dev: <strong>admin / Admin@123</strong><br>
      manager: munkh / Manager@123 · agent: saraa / Agent@123
    </div>
  </div>
</div>

<script type="module">
import { API_BASE, saveSession, getToken } from './js/core.js';

// Аль хэдийн нэвтэрсэн бол шууд самбар руу
if (getToken()) location.href = 'index.html';

const form = document.getElementById('login-form');
const errEl = document.getElementById('err');
const btn = document.getElementById('submit');

form.addEventListener('submit', async (e) => {
  e.preventDefault();
  errEl.hidden = true;
  btn.disabled = true;
  btn.textContent = 'Нэвтэрч байна...';
  try {
    const res = await fetch(`${API_BASE}/auth/login`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        username: form.username.value.trim(),
        password: form.password.value
      })
    });
    const payload = await res.json();
    if (!res.ok) {
      errEl.textContent = payload?.error?.message || 'Нэвтрэхэд алдаа гарлаа';
      errEl.hidden = false;
      btn.disabled = false;
      btn.textContent = 'Нэвтрэх';
      return;
    }
    saveSession(payload.data);
    location.href = 'index.html';
  } catch (ex) {
    errEl.textContent = 'Сүлжээний алдаа. Дахин оролдоно уу.';
    errEl.hidden = false;
    btn.disabled = false;
    btn.textContent = 'Нэвтрэх';
  }
});
</script>
</body>
</html>
